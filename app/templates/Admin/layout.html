<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin{% endblock %} — GradeOnline</title>
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/admin.css">
  <style>
    .layout { display: block; min-height: 100vh; }
    .main-content {
      grid-column: unset;
      margin-left: var(--sidebar-w);
      margin-top: var(--topbar-h);
      padding: 24px;
      min-height: calc(100vh - var(--topbar-h));
    }
    @media (max-width: 768px) {
      .main-content { margin-left: 0; padding: 16px; }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="/admin/dashboard" class="logo-mark">
        <div class="logo-text">GradeOnline</div>
      </a>
    </div>
    <nav class="sidebar-nav">

      <a href="/admin/dashboard" class="nav-item">Dashboard</a>

      
      <a href="/admin/departments" class="nav-item">Departments</a>
      <a href="/admin/semesters"   class="nav-item">Semesters</a>
      <a href="/admin/subjects"    class="nav-item">Subjects</a>

     
      <a href="/admin/teachers" class="nav-item">Teachers</a>
      <a href="/admin/students" class="nav-item">Students</a>

      <a href="/admin/exams"            class="nav-item">Exams</a>
      <a href="/admin/marking-overview" class="nav-item">Marking Overview</a>
     

    </nav>
    <div class="sidebar-footer">
      <div class="user-badge">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <div class="user-name">Administrator</div>
        </div>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" id="menu-toggle">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <h1 class="page-title">{% block page_title %}Admin{% endblock %}</h1>
    </div>
    <div class="topbar-right">
      <a href="/admin/logout" class="topbar-btn logout" title="Logout">
       <button>Logout</button>
      </a>
    </div>
  </header>

  <main class="main-content">{% block content %}{% endblock %}</main>
</div>
<div id="toast-container" class="toast-container"></div>
<script src="/static/js/utils.js"></script>
<script src="/static/js/admin.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
